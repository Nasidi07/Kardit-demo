<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issuing Banks · Kardit Onboarding</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="onb-scr">
    <div id="appbar-mount"></div>
    <div class="onb-body">
      <div id="rail-mount"></div>
      <main class="onb-main">
        <div class="container">
          <div class="onb-eyebrow">Step 3 of 4</div>
          <h2 class="onb-title">Select your issuing banks</h2>
          <p class="onb-sub">Choose the banks Kardit will route transactions through on your behalf. You can add more later from your dashboard.</p>

          <div class="onb-card">
            <div style="padding:14px 22px; border-bottom:1px solid var(--cs-line); display:flex; align-items:center; gap:14px">
              <div style="position:relative; flex:1">
                <span style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--cs-ink-100)"><i data-lucide="search" style="width:16px; height:16px"></i></span>
                <input id="bank-search" type="text" placeholder="Search banks..." style="width:100%; padding:10px 12px 10px 38px; border-radius:8px; border:1px solid var(--cs-line-strong); font-size:14px; outline:none; font-family:inherit">
              </div>
              <span class="onb-tag ok" id="selected-tag">0 selected</span>
            </div>
            <div id="bank-list" style="max-height:360px; overflow:auto"></div>
          </div>

          <div class="onb-step-actions">
            <a href="docs.html" class="onb-btn onb-btn-ghost">← Back</a>
            <div style="display:flex; gap:10px">
              <a href="index.html" class="onb-btn onb-btn-secondary">Save Draft</a>
              <a href="review.html" class="onb-btn onb-btn-primary">Review & Submit <i data-lucide="arrow-right"></i></a>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="app.js"></script>
  <script>
    const ALL_BANKS = [
      { id: "gtb",       name: "Guaranty Trust Bank",     code: "058" },
      { id: "access",    name: "Access Bank",             code: "044" },
      { id: "zenith",    name: "Zenith Bank",             code: "057" },
      { id: "firstbank", name: "First Bank of Nigeria",   code: "011" },
      { id: "uba",       name: "United Bank for Africa",  code: "033" },
      { id: "fidelity",  name: "Fidelity Bank",           code: "070" },
      { id: "stanbic",   name: "Stanbic IBTC Bank",       code: "221" },
      { id: "wema",      name: "Wema Bank",               code: "035" },
      { id: "sterling",  name: "Sterling Bank",           code: "232" },
      { id: "union",     name: "Union Bank",              code: "032" },
    ];

    function renderBanks(query) {
      const state = getState();
      const banks = state.banks || [];
      const q = (query || "").toLowerCase();
      const filtered = ALL_BANKS.filter(b => b.name.toLowerCase().includes(q));
      const list = document.getElementById("bank-list");
      list.innerHTML = filtered.map((b, i) => {
        const sel = banks.includes(b.id);
        return `
          <label style="display:flex; align-items:center; gap:14px; padding:14px 22px; ${i < filtered.length - 1 ? 'border-bottom:1px solid var(--cs-line)' : ''}; cursor:pointer; background:${sel ? 'var(--cs-green-100)' : '#fff'}">
            <input type="checkbox" ${sel ? 'checked' : ''} onchange="toggleBank('${b.id}')" style="width:18px; height:18px; accent-color:var(--cs-green-700)">
            <div style="width:36px; height:36px; border-radius:8px; background:var(--cs-mist); color:var(--cs-ink-200); display:grid; place-items:center">
              <i data-lucide="building-2" style="width:18px; height:18px"></i>
            </div>
            <div style="flex:1">
              <div style="font-weight:600; font-size:14px; color:var(--cs-ink-700)">${b.name}</div>
              <div style="font-size:12px; color:var(--cs-ink-100)">CBN code · ${b.code}</div>
            </div>
            ${sel ? `<i data-lucide="check" style="width:18px; height:18px; color:var(--cs-green-700)"></i>` : ''}
          </label>
        `;
      }).join("");
      document.getElementById("selected-tag").textContent = `${banks.length} selected`;
      if (window.lucide) lucide.createIcons();
    }

    function toggleBank(id) {
      const state = getState();
      const banks = state.banks || [];
      const newBanks = banks.includes(id) ? banks.filter(x => x !== id) : [...banks, id];
      setState({ banks: newBanks });
      const q = document.getElementById("bank-search").value;
      renderBanks(q);
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderBanks("");
      document.getElementById("bank-search").addEventListener("input", e => renderBanks(e.target.value));
    });
  </script>
</body>
</html>
