<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card detail · Kardit CMS</title>
  <style>
/* ─────────────────────────────────────────────────────────────
   Kardit Mini CMS —  Batch Onboarding
   Shell adapted to match the existing Affiliate Portal pattern:
   top app bar (logo + breadcrumb + help + user), left flow-rail
   stepper, centered content container. No persistent left nav,
   no right rail — those belong to the parent app shell.
   ───────────────────────────────────────────────────────────── */

@import url('cs-tokens.css');

:root {
  --bg:               var(--cs-paper);
  --surface:          var(--cs-white);
  --border:           var(--cs-line);
  --border-strong:    var(--cs-line-strong);

  --text:             var(--cs-ink-700);
  --text-secondary:   var(--cs-ink-400);
  --text-tertiary:    var(--cs-ink-200);
  --text-muted:       var(--cs-ink-100);

  --accent:           var(--cs-green-700);
  --accent-hover:     var(--cs-green-900);

  --warning-bg:       #FFF6DD;
  --warning-ring:     #F2DC9E;
  --warning-text:     #7A5800;

  --info:             #2978B5;
  --info-bg:          #E6F0F9;
  --info-ring:        #B7D2EA;
  --info-text:        #1B547F;

  --font-sans:        var(--cs-font-body);
  --font-display:     var(--cs-font-display);
  --font-mono:        var(--cs-font-mono);
}

/* ─────────────────────────────────────────────────────────────
   Reset & base
   ───────────────────────────────────────────────────────────── */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--cs-paper);
  color: var(--cs-ink-700);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: var(--cs-leading-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }
table { border-collapse: collapse; width: 100%; }
.mono { font-family: var(--font-mono); }
.tabular { font-variant-numeric: tabular-nums; }

/* ─────────────────────────────────────────────────────────────
   App shell — matches the affiliate onboarding flow shell
   ───────────────────────────────────────────────────────────── */

.scr {
  font-family: var(--font-sans);
  color: var(--cs-ink-700);
  background: var(--cs-paper);
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Top app bar */
.scr-app-bar {
  display: flex;
  align-items: center;
  gap: var(--cs-space-5);
  padding: 14px 28px;
  background: var(--cs-white);
  border-bottom: 1px solid var(--cs-line);
  flex-shrink: 0;
}

.logo-mark {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 24px;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--cs-green-900);
  display: inline-flex;
  align-items: baseline;
  user-select: none;
}
.logo-mark__i { position: relative; display: inline-block; }
.logo-mark__i::after {
  content: "";
  position: absolute;
  top: -0.18em;
  left: 50%;
  width: 0.22em;
  height: 0.22em;
  border-radius: 50%;
  background: var(--cs-red-700);
  transform: translate(-50%, 0);
}

.scr-app-bar .vbar {
  width: 1px;
  height: 28px;
  background: var(--cs-line);
}

.scr-app-bar .crumbs {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--cs-ink-200);
}
.scr-app-bar .crumbs strong { color: var(--cs-ink-700); font-weight: 600; }
.scr-app-bar .crumbs svg { width: 14px; height: 14px; color: var(--cs-ink-100); flex-shrink: 0; }
.scr-app-bar .crumbs a:hover { color: var(--cs-green-700); }

.scr-app-bar .spacer { flex: 1; }

.scr-app-bar .help-link {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--cs-ink-200);
  padding: 6px 10px;
  border-radius: var(--cs-radius-sm);
  transition: background 120ms ease, color 120ms ease;
}
.scr-app-bar .help-link:hover { background: var(--cs-mist); color: var(--cs-ink-700); }
.scr-app-bar .help-link svg { width: 16px; height: 16px; }

.scr-app-bar .user {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--cs-ink-200);
}
.scr-app-bar .avatar {
  width: 32px;
  height: 32px;
  border-radius: 999px;
  background: var(--cs-green-100);
  color: var(--cs-green-900);
  display: grid;
  place-items: center;
  font-weight: 700;
  font-size: 12px;
  border: 1px solid var(--cs-green-300);
  flex-shrink: 0;
}
.scr-app-bar .user-meta { display: flex; flex-direction: column; }
.scr-app-bar .user-name { color: var(--cs-ink-700); font-weight: 600; line-height: 1.2; }
.scr-app-bar .user-org { font-size: 11px; color: var(--cs-ink-100); margin-top: 2px; }

/* Body grid */
.scr-body {
  flex: 1;
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 0;
}

/* Left rail (flow stepper) */
.scr-rail {
  background: var(--cs-white);
  border-right: 1px solid var(--cs-line);
  padding: 28px 22px;
  overflow: auto;
}

.scr-rail h6 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--cs-ink-100);
  font-weight: 700;
  margin: 0 0 14px;
}

.scr-rail ol {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.scr-rail li {
  border-radius: var(--cs-radius-md);
  font-size: 13.5px;
  color: var(--cs-ink-400);
  transition: background 120ms ease;
}
.scr-rail li:hover { background: var(--cs-mist); }
.scr-rail li.is-active { background: var(--cs-green-100); color: var(--cs-ink-700); font-weight: 600; }
.scr-rail li.is-done { color: var(--cs-ink-200); }

.scr-rail a.step-link {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 10px;
  width: 100%;
  text-decoration: none;
  color: inherit;
}

.scr-rail .step-dot {
  width: 22px;
  height: 22px;
  border-radius: 999px;
  flex-shrink: 0;
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: 700;
  background: var(--cs-mist);
  color: var(--cs-ink-200);
  border: 1px solid var(--cs-line-strong);
}
.scr-rail li.is-active .step-dot {
  background: var(--cs-green-700);
  color: var(--cs-white);
  border-color: var(--cs-green-700);
}
.scr-rail li.is-done .step-dot {
  background: var(--cs-green-500);
  color: var(--cs-white);
  border-color: var(--cs-green-500);
}
.scr-rail .step-dot svg { width: 12px; height: 12px; }

.scr-rail .step-content { flex: 1; min-width: 0; }
.scr-rail .step-meta { font-size: 11px; color: var(--cs-ink-100); margin-top: 2px; line-height: 1.4; }

.scr-rail .step-actor {
  display: inline-flex;
  align-items: center;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 999px;
  background: var(--cs-mist);
  color: var(--cs-ink-200);
  margin-top: 6px;
}
.scr-rail .step-actor.checker {
  background: var(--cs-red-100);
  color: var(--cs-red-900);
}

/* Help callout in the rail bottom */
.rail-help {
  margin-top: 32px;
  padding: 14px;
  background: var(--cs-green-100);
  border: 1px solid var(--cs-green-300);
  border-radius: var(--cs-radius-md);
}
.rail-help-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  color: var(--cs-green-900);
}
.rail-help-title svg { width: 14px; height: 14px; }
.rail-help-body {
  font-size: 12px;
  color: var(--cs-ink-200);
  margin-top: 6px;
  line-height: 1.5;
}
.rail-help-link {
  font-size: 12px;
  font-weight: 700;
  color: var(--cs-green-700);
  margin-top: 10px;
  display: inline-block;
}
.rail-help-link:hover { color: var(--cs-green-900); }

/* Main content area */
.scr-main {
  overflow: auto;
  padding: 36px 48px 56px;
}

.scr-main .container {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.scr-main .container--narrow { max-width: 720px; }

/* Responsive: collapse the rail on smaller frames */
@media (max-width: 960px) {
  .scr-body { grid-template-columns: 1fr; }
  .scr-rail { display: none; }
  .scr-main { padding: 24px; }
}

/* ─────────────────────────────────────────────────────────────
   Page header / titles
   ───────────────────────────────────────────────────────────── */

.page-head { display: flex; align-items: end; justify-content: space-between; gap: 24px; }
.page-head .title-row { display: flex; align-items: center; gap: 12px; }

.page-eyebrow {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--cs-green-700);
  margin-bottom: 8px;
}

.page-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--cs-ink-900);
  line-height: var(--cs-leading-tight);
}
.page-sub {
  font-size: 15px;
  color: var(--cs-ink-200);
  margin-top: 8px;
  line-height: var(--cs-leading-body);
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--cs-ink-200);
  margin-bottom: 16px;
  font-weight: 500;
}
.back-link:hover { color: var(--cs-green-700); }
.back-link svg { width: 14px; height: 14px; }

.breadcrumbs {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--cs-ink-100);
  margin-bottom: 16px;
}
.breadcrumbs a { color: var(--cs-ink-200); transition: color 120ms ease; }
.breadcrumbs a:hover { color: var(--cs-green-700); }
.breadcrumbs svg { width: 12px; height: 12px; flex-shrink: 0; }

/* ─────────────────────────────────────────────────────────────
   KPI cards
   ───────────────────────────────────────────────────────────── */

.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.kpis.cols-3 { grid-template-columns: repeat(3, 1fr); }

.kpi {
  border: 1px solid var(--cs-line);
  background: var(--cs-white);
  border-radius: var(--cs-radius-lg);
  padding: 20px;
  box-shadow: var(--cs-shadow-xs);
}
.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: var(--cs-tracking-caps);
  color: var(--cs-ink-100);
  font-weight: 700;
}
.kpi-value {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 800;
  margin-top: 10px;
  font-variant-numeric: tabular-nums;
  letter-spacing: var(--cs-tracking-tight);
  color: var(--cs-ink-900);
  line-height: 1.1;
}
.kpi-value.success { color: var(--cs-green-700); }
.kpi-value.warning { color: var(--warning-text); }
.kpi-value.danger  { color: var(--cs-red-700); }
.kpi-value.accent  { color: var(--cs-green-700); }
.kpi-sub { font-size: 11.5px; color: var(--cs-ink-100); margin-top: 6px; }

/* ─────────────────────────────────────────────────────────────
   Card
   ───────────────────────────────────────────────────────────── */

.card {
  border: 1px solid var(--cs-line);
  background: var(--cs-white);
  border-radius: var(--cs-radius-lg);
  overflow: hidden;
  box-shadow: var(--cs-shadow-sm);
}
.card-pad { padding: 24px; }
.card-pad-lg { padding: 28px; }

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--cs-line);
  background: var(--cs-white);
}
.card-head-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--cs-ink-700);
}
.card-head-sub { font-size: 12px; color: var(--cs-ink-100); margin-top: 3px; }

/* ─────────────────────────────────────────────────────────────
   Tables
   ───────────────────────────────────────────────────────────── */

table.data { font-size: 13px; }
table.data thead tr {
  border-bottom: 1px solid var(--cs-line);
  background: var(--cs-paper);
}
table.data th {
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: var(--cs-tracking-caps);
  color: var(--cs-ink-100);
  padding: 10px 20px;
}
table.data td {
  padding: 14px 20px;
  border-bottom: 1px solid var(--cs-line);
  color: var(--cs-ink-400);
}
table.data tbody tr:last-child td { border-bottom: none; }
table.data tbody tr:hover { background: var(--cs-paper); }
table.data .right { text-align: right; }
table.data .id { font-family: var(--font-mono); font-size: 11.5px; color: var(--cs-ink-700); font-weight: 500; }
table.data .meta { color: var(--cs-ink-200); }

.icon-button {
  width: 28px; height: 28px;
  display: inline-grid; place-items: center;
  border-radius: var(--cs-radius-sm);
  color: var(--cs-ink-200);
  transition: background 120ms ease, color 120ms ease;
}
.icon-button:hover { background: var(--cs-mist); color: var(--cs-green-700); }
.icon-button svg { width: 16px; height: 16px; }

/* ─────────────────────────────────────────────────────────────
   Buttons
   ───────────────────────────────────────────────────────────── */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px;
  border-radius: var(--cs-radius-md);
  font-size: 13.5px;
  font-weight: 700;
  font-family: var(--font-sans);
  white-space: nowrap;
  transition: background 120ms ease, color 120ms ease, transform 100ms ease, box-shadow 120ms ease;
}
.btn:active { transform: scale(0.98); }
.btn svg { width: 14px; height: 14px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary {
  background: var(--cs-green-700);
  color: var(--cs-white);
  box-shadow: 0 2px 6px rgba(15, 30, 18, 0.10);
}
.btn-primary:hover:not(:disabled) { background: var(--cs-green-900); }

.btn-secondary {
  background: var(--cs-white);
  color: var(--cs-green-700);
  border: 1.5px solid var(--cs-green-700);
  padding: 8.5px 14.5px;
}
.btn-secondary:hover:not(:disabled) { background: var(--cs-green-100); }

.btn-ghost {
  background: transparent;
  color: var(--cs-ink-400);
  border: 1px solid var(--cs-line-strong);
  padding: 9px 15px;
}
.btn-ghost:hover:not(:disabled) { background: var(--cs-mist); color: var(--cs-ink-700); }

.btn-success {
  background: var(--cs-green-700);
  color: var(--cs-white);
  box-shadow: 0 2px 6px rgba(15, 79, 46, 0.20);
}
.btn-success:hover:not(:disabled) { background: var(--cs-green-900); }

.btn-danger {
  background: var(--cs-white);
  color: var(--cs-red-700);
  border: 1.5px solid var(--cs-red-700);
  padding: 8.5px 14.5px;
}
.btn-danger:hover:not(:disabled) { background: var(--cs-red-100); color: var(--cs-red-900); }

.btn-sm { padding: 6px 11px; font-size: 12px; }
.btn-sm svg { width: 12px; height: 12px; }
.btn-sm.btn-secondary, .btn-sm.btn-danger { padding: 4.5px 9.5px; }
.btn-sm.btn-ghost { padding: 5px 10px; }
.btn-lg { padding: 12px 22px; font-size: 14px; }

/* ─────────────────────────────────────────────────────────────
   Inputs
   ───────────────────────────────────────────────────────────── */

.input, .select {
  background: var(--cs-white);
  border: 1px solid var(--cs-line-strong);
  border-radius: var(--cs-radius-sm);
  padding: 10px 13px;
  color: var(--cs-ink-700);
  font-size: 13.5px;
  width: 100%;
  outline: none;
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.input::placeholder { color: var(--cs-ink-100); }
.input:focus, .select:focus {
  border-color: var(--cs-green-700);
  box-shadow: var(--cs-shadow-focus);
}

.input-sm { padding: 7px 12px 7px 32px; font-size: 12.5px; }

.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--cs-ink-100);
  pointer-events: none;
}

.select-wrap { position: relative; }
.select { appearance: none; padding-right: 36px; }
.select-wrap > svg {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--cs-ink-100);
  pointer-events: none;
}

textarea.input { resize: vertical; min-height: 90px; line-height: var(--cs-leading-body); }

.label {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--cs-ink-700);
  margin-bottom: 6px;
}

.help { font-size: 12px; color: var(--cs-ink-100); margin-top: 6px; line-height: 1.5; }

/* ─────────────────────────────────────────────────────────────
   Status badges (ChamsSwitch tag-style — pill, soft tint)
   ───────────────────────────────────────────────────────────── */

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: var(--cs-radius-pill);
  font-size: 11.5px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  border: 1px solid transparent;
  letter-spacing: 0.01em;
}

.badge.uploaded   { background: var(--cs-mist);    color: var(--cs-ink-200); border-color: var(--cs-line); }
.badge.validated  { background: var(--info-bg);    color: var(--info-text);  border-color: var(--info-ring); }
.badge.pending    { background: var(--warning-bg); color: var(--warning-text); border-color: var(--warning-ring); }
.badge.processing { background: var(--info-bg);    color: var(--info-text);  border-color: var(--info-ring); }
.badge.completed  { background: var(--cs-green-100); color: var(--cs-green-900); border-color: var(--cs-green-300); }
.badge.partial    { background: var(--warning-bg); color: var(--warning-text); border-color: var(--warning-ring); }
.badge.failed     { background: var(--cs-red-100); color: var(--cs-red-900); border-color: var(--cs-red-300); }
.badge.processed  { background: var(--cs-green-100); color: var(--cs-green-900); border-color: var(--cs-green-300); }

.badge.error-code {
  background: var(--cs-red-100);
  color: var(--cs-red-900);
  border-color: var(--cs-red-300);
  font-family: var(--font-mono);
  font-weight: 500;
  letter-spacing: 0;
}

.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--cs-green-500);
  animation: pulse 2s ease-in-out infinite;
  display: inline-block;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ─────────────────────────────────────────────────────────────
   Utility row patterns
   ───────────────────────────────────────────────────────────── */

.row-between { display: flex; align-items: center; justify-content: space-between; }
.row-end { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
.gap-2 { display: flex; align-items: center; gap: 8px; }

.divider-top {
  border-top: 1px solid var(--cs-line);
  padding-top: 20px;
}

/* ─────────────────────────────────────────────────────────────
   Definition list (Submit / Approval detail)
   ───────────────────────────────────────────────────────────── */

dl.specs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0 36px;
}
dl.specs > div {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--cs-line);
  font-size: 13.5px;
}
dl.specs > div:last-child { border-bottom: none; }
dl.specs dt { color: var(--cs-ink-200); }
dl.specs dd { color: var(--cs-ink-700); font-variant-numeric: tabular-nums; font-weight: 500; }
dl.specs dd.mono { font-family: var(--font-mono); font-size: 12.5px; font-weight: 500; }
dl.specs dd.success { color: var(--cs-green-700); }
dl.specs dd.danger  { color: var(--cs-red-700); }

/* ─────────────────────────────────────────────────────────────
   Notice / callout
   ───────────────────────────────────────────────────────────── */

.notice {
  display: flex;
  gap: 10px;
  padding: 14px 16px;
  border-radius: var(--cs-radius-md);
  font-size: 12.5px;
  line-height: var(--cs-leading-body);
}
.notice svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
.notice .strong { font-weight: 700; }

.notice.info {
  background: var(--cs-mist);
  color: var(--cs-ink-400);
  border: 1px solid var(--cs-line);
}
.notice.info .strong { color: var(--cs-ink-700); }
.notice.info svg { color: var(--cs-ink-200); }

.notice.warning {
  background: var(--warning-bg);
  color: var(--warning-text);
  border: 1px solid var(--warning-ring);
}
.notice.warning svg { color: var(--cs-warning); }
.notice.warning .strong { color: var(--warning-text); }

/* ─────────────────────────────────────────────────────────────
   Upload dropzone
   ───────────────────────────────────────────────────────────── */

.dropzone {
  display: block;
  border: 2px dashed var(--cs-line-strong);
  background: var(--cs-paper);
  border-radius: var(--cs-radius-md);
  padding: 44px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 120ms ease, background 120ms ease;
}
.dropzone:hover { border-color: var(--cs-green-500); background: var(--cs-green-100); }
.dropzone.has-file {
  border-style: solid;
  border-color: var(--cs-green-300);
  background: var(--cs-green-100);
  text-align: left;
  padding: 18px;
}
.dropzone-prompt { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.dropzone-prompt svg { width: 32px; height: 32px; color: var(--cs-green-700); }
.dropzone-prompt-main { color: var(--cs-ink-700); font-size: 14px; font-weight: 600; }
.dropzone-prompt-sub { color: var(--cs-ink-100); font-size: 12px; }

.file-pill { display: flex; align-items: center; gap: 12px; }
.file-icon {
  width: 42px; height: 42px;
  background: var(--cs-white);
  border: 1px solid var(--cs-green-300);
  border-radius: var(--cs-radius-sm);
  display: grid;
  place-items: center;
  color: var(--cs-green-700);
  flex-shrink: 0;
}
.file-icon svg { width: 18px; height: 18px; }
.file-meta { flex: 1; min-width: 0; }
.file-name { font-size: 13.5px; color: var(--cs-ink-700); font-weight: 600; }
.file-detail { font-size: 12px; color: var(--cs-ink-200); margin-top: 2px; }

/* ─────────────────────────────────────────────────────────────
   Approval queue
   ───────────────────────────────────────────────────────────── */

.approval-grid { display: grid; grid-template-columns: 2fr 3fr; gap: 18px; }
.queue-list { display: flex; flex-direction: column; }

.queue-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 14px 18px;
  border-bottom: 1px solid var(--cs-line);
  transition: background 120ms ease;
}
.queue-item:hover { background: var(--cs-paper); }
.queue-item.selected { background: var(--cs-green-100); border-left: 3px solid var(--cs-green-700); padding-left: 15px; }
.queue-item:last-child { border-bottom: none; }

.queue-row { display: flex; justify-content: space-between; align-items: center; }
.queue-id { font-family: var(--font-mono); font-size: 12px; color: var(--cs-ink-700); font-weight: 600; }
.queue-rows { font-size: 11.5px; color: var(--cs-ink-100); font-variant-numeric: tabular-nums; font-weight: 500; }
.queue-file { font-size: 12px; color: var(--cs-ink-400); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.queue-meta { font-size: 11.5px; color: var(--cs-ink-100); margin-top: 4px; }

/* ─────────────────────────────────────────────────────────────
   Progress
   ───────────────────────────────────────────────────────────── */

.progress-bar {
  height: 8px;
  background: var(--cs-mist);
  border-radius: var(--cs-radius-pill);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--cs-green-700);
  border-radius: var(--cs-radius-pill);
  transition: width 500ms ease;
}

.processing-numbers { display: flex; align-items: end; justify-content: space-between; margin-bottom: 14px; }
.processing-progress {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 800;
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
  letter-spacing: var(--cs-tracking-tight);
  color: var(--cs-ink-900);
  line-height: 1.1;
}
.processing-progress .total { color: var(--cs-ink-100); font-weight: 500; }
.processing-progress.pct { color: var(--cs-green-700); }

/* ─────────────────────────────────────────────────────────────
   Failure cluster
   ───────────────────────────────────────────────────────────── */

.failure-cluster {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border: 1px solid var(--cs-red-300);
  background: var(--cs-red-100);
  border-radius: var(--cs-radius-md);
}
.failure-cluster + .failure-cluster { margin-top: 10px; }
.failure-info { display: flex; align-items: center; gap: 14px; }
.failure-count {
  width: 32px; height: 32px;
  background: var(--cs-white);
  border: 1px solid var(--cs-red-300);
  border-radius: var(--cs-radius-sm);
  display: grid; place-items: center;
  color: var(--cs-red-700);
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.failure-code {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--cs-red-900);
  font-weight: 600;
}
.failure-desc { font-size: 12px; color: var(--cs-red-900); margin-top: 3px; opacity: 0.85; }

/* ─────────────────────────────────────────────────────────────
   Result inline status pills
   ───────────────────────────────────────────────────────────── */

.result-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; }
.result-pill svg { width: 14px; height: 14px; }
.result-pill.success    { color: var(--cs-green-700); }
.result-pill.processing { color: var(--info); }
.result-pill.failed     { color: var(--cs-red-700); }

/* ─────────────────────────────────────────────────────────────
   Welcome page — Batch Issuance Journey landing
   Mirrors the production "Affiliate Journey" welcome pattern
   ───────────────────────────────────────────────────────────── */

.scr-main--welcome { padding: 0; }
.scr-main--welcome .container { gap: 32px; padding: 60px 28px 40px; }

.welcome-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 32px;
  flex-wrap: wrap;
}

.welcome-text { flex: 1; min-width: 320px; }

.welcome-eyebrow {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--cs-green-700);
  margin-bottom: 18px;
}

.welcome-title {
  font-family: var(--font-display);
  font-size: 56px;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.05;
  color: var(--cs-ink-900);
  margin-bottom: 18px;
}

.welcome-sub {
  font-size: 16px;
  color: var(--cs-ink-200);
  line-height: 1.6;
  max-width: 640px;
}

/* "Currently" pill on the upper right */
.currently-pill {
  background: var(--cs-white);
  border: 1px solid var(--cs-line);
  border-radius: 999px;
  padding: 10px 28px 10px 10px;
  display: flex;
  align-items: center;
  gap: 18px;
  box-shadow: var(--cs-shadow-xs);
  flex-shrink: 0;
}

.currently-pill__num {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 1.5px solid var(--cs-line-strong);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: var(--font-display);
}

.currently-pill__num-big {
  font-size: 22px;
  font-weight: 800;
  color: var(--cs-ink-900);
  line-height: 1;
}

.currently-pill__num-total {
  font-size: 11px;
  color: var(--cs-ink-200);
  font-weight: 600;
  margin-top: 2px;
}

.currently-pill__meta { display: flex; flex-direction: column; gap: 2px; }

.currently-pill__label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--cs-green-700);
}

.currently-pill__value {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  color: var(--cs-ink-900);
}

/* Resume / status banner — green-bordered card with red CTA */
.resume-banner {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 20px 24px;
  background: var(--cs-white);
  border: 1.5px solid var(--cs-green-300);
  border-radius: var(--cs-radius-lg);
  box-shadow: var(--cs-shadow-xs);
}

.resume-banner__icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--cs-white);
  border: 1.5px solid var(--cs-green-300);
  color: var(--cs-green-700);
  display: grid;
  place-items: center;
  flex-shrink: 0;
}

.resume-banner__icon svg { width: 22px; height: 22px; }

.resume-banner__body { flex: 1; }

.resume-banner__title {
  font-size: 18px;
  font-weight: 700;
  color: var(--cs-ink-900);
  font-family: var(--font-display);
  letter-spacing: -0.01em;
}

.resume-banner__meta {
  font-size: 13px;
  color: var(--cs-ink-200);
  margin-top: 6px;
}

.resume-banner__actions {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.btn-accent {
  background: var(--cs-red-700);
  color: var(--cs-white);
  padding: 11px 22px;
  border-radius: var(--cs-radius-md);
  font-weight: 700;
  font-size: 14px;
  box-shadow: 0 2px 8px rgba(200, 36, 44, 0.28);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 120ms ease, transform 100ms ease;
}
.btn-accent:hover { background: var(--cs-red-900); }
.btn-accent:active { transform: scale(0.98); }

.btn-link-green {
  color: var(--cs-green-700);
  font-weight: 700;
  font-size: 14px;
  padding: 6px 4px;
}
.btn-link-green:hover { color: var(--cs-green-900); }

/* Big stepper card on the welcome page */
.big-stepper {
  background: var(--cs-white);
  border: 1px solid var(--cs-line);
  border-radius: var(--cs-radius-lg);
  padding: 20px 16px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  box-shadow: var(--cs-shadow-xs);
}

.big-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 14px 8px;
  border-radius: var(--cs-radius-md);
  transition: background 120ms ease;
  text-decoration: none;
  color: inherit;
}
.big-step:hover { background: var(--cs-mist); }
.big-step.is-active { background: var(--cs-green-100); }

.big-step__circle {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1.5px solid var(--cs-line-strong);
  background: var(--cs-white);
  display: grid;
  place-items: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--cs-ink-200);
  font-family: var(--font-display);
  font-variant-numeric: tabular-nums;
}
.big-step.is-active .big-step__circle {
  background: var(--cs-green-700);
  color: var(--cs-white);
  border-color: var(--cs-green-700);
}
.big-step.is-done .big-step__circle {
  background: var(--cs-green-500);
  color: var(--cs-white);
  border-color: var(--cs-green-500);
}
.big-step__circle svg { width: 14px; height: 14px; }

.big-step__label {
  font-size: 13px;
  font-weight: 600;
  color: var(--cs-ink-200);
  text-align: center;
  line-height: 1.3;
}
.big-step.is-active .big-step__label {
  color: var(--cs-ink-900);
  font-weight: 700;
}

/* ─────────────────────────────────────────────────────────────
   Horizontal stepper for step pages (compact version)
   Sits between AppBar and main content
   ───────────────────────────────────────────────────────────── */

.hstepper {
  background: var(--cs-white);
  border-bottom: 1px solid var(--cs-line);
  padding: 14px 28px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
}

.hstep {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 12.5px;
  color: var(--cs-ink-200);
  white-space: nowrap;
  text-decoration: none;
  transition: background 120ms ease, color 120ms ease;
}
.hstep:hover { background: var(--cs-mist); color: var(--cs-ink-700); }
.hstep.is-active { background: var(--cs-green-100); color: var(--cs-ink-900); font-weight: 600; }

.hstep__circle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--cs-line-strong);
  background: var(--cs-white);
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--cs-ink-200);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.hstep.is-active .hstep__circle {
  background: var(--cs-green-700);
  color: var(--cs-white);
  border-color: var(--cs-green-700);
}
.hstep.is-done .hstep__circle {
  background: var(--cs-green-500);
  color: var(--cs-white);
  border-color: var(--cs-green-500);
}
.hstep__circle svg { width: 10px; height: 10px; }

.hstep__actor {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 1px 6px;
  border-radius: 999px;
  background: var(--cs-mist);
  color: var(--cs-ink-100);
}
.hstep.is-active .hstep__actor { background: var(--cs-white); }
.hstep__actor.checker { background: var(--cs-red-100); color: var(--cs-red-900); }

/* Responsive: scale welcome title down on narrow viewports */
@media (max-width: 720px) {
  .welcome-title { font-size: 38px; }
  .welcome-head { gap: 20px; }
  .currently-pill { padding-right: 16px; }
  .big-stepper {
    grid-template-columns: repeat(7, minmax(80px, 1fr));
    overflow-x: auto;
  }
  .resume-banner { flex-direction: column; align-items: flex-start; }
}

/* ─────────────────────────────────────────────────────────────
   Outbound link styles (logo wrapper, sign-out)
   ───────────────────────────────────────────────────────────── */

.logo-link {
  text-decoration: none;
  display: inline-block;
  border-radius: var(--cs-radius-sm);
  transition: opacity 120ms ease;
}
.logo-link:hover { opacity: 0.75; }

.signout-link {
  font-size: 11px;
  color: var(--cs-green-700);
  font-weight: 700;
  text-decoration: none;
  transition: color 120ms ease;
}
.signout-link:hover { color: var(--cs-green-900); }

/* ─────────────────────────────────────────────────────────────
    — Customer capture form styles
   ───────────────────────────────────────────────────────────── */

.form-section {
  border-top: 1px solid var(--cs-line);
  padding: 28px 0 4px;
}
.form-section:first-of-type { border-top: none; padding-top: 0; }

.form-section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 20px;
}
.form-section-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--cs-ink-900);
  letter-spacing: -0.01em;
}
.form-section-meta {
  font-size: 12px;
  color: var(--cs-ink-100);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px 20px;
}
.form-grid--3 { grid-template-columns: 1fr 1fr 1fr; }
.form-row-full { grid-column: 1 / -1; }
.form-row-2 { grid-column: span 2; }

.field { display: flex; flex-direction: column; }
.field label,
.field .label { font-size: 12.5px; font-weight: 600; color: var(--cs-ink-700); margin-bottom: 6px; }
.field .req { color: var(--cs-red-700); margin-left: 2px; }
.field input[type="text"],
.field input[type="email"],
.field input[type="tel"],
.field input[type="date"],
.field input[type="number"],
.field select,
.field textarea {
  background: var(--cs-white);
  border: 1px solid var(--cs-line-strong);
  border-radius: var(--cs-radius-sm);
  padding: 10px 13px;
  color: var(--cs-ink-700);
  font-size: 13.5px;
  font-family: var(--font-sans);
  width: 100%;
  outline: none;
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.field input::placeholder { color: var(--cs-ink-100); }
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--cs-green-700);
  box-shadow: var(--cs-shadow-focus);
}
.field .help { font-size: 11.5px; color: var(--cs-ink-100); margin-top: 5px; line-height: 1.4; }
.field.is-mono input { font-family: var(--font-mono); letter-spacing: 0.04em; }

/* Radio group */
.radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
.radio-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border: 1px solid var(--cs-line-strong);
  border-radius: var(--cs-radius-md);
  background: var(--cs-white);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--cs-ink-400);
  transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
}
.radio-pill input { position: absolute; opacity: 0; pointer-events: none; }
.radio-pill .dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px solid var(--cs-line-strong);
  background: var(--cs-white);
  display: inline-block;
  position: relative;
  flex-shrink: 0;
}
.radio-pill input:checked + .dot {
  border-color: var(--cs-green-700);
}
.radio-pill input:checked + .dot::after {
  content: "";
  position: absolute;
  inset: 2.5px;
  border-radius: 50%;
  background: var(--cs-green-700);
}
.radio-pill:has(input:checked) {
  border-color: var(--cs-green-700);
  background: var(--cs-green-100);
  color: var(--cs-ink-900);
  font-weight: 700;
}

/* Form footer (sticky-ish action row) */
.form-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 28px;
  margin-top: 8px;
  border-top: 1px solid var(--cs-line);
}
.form-foot .left { display: flex; align-items: center; gap: 10px; }
.form-foot .right { display: flex; align-items: center; gap: 10px; }

/* Saved confirmation screen */
.saved-card {
  background: var(--cs-white);
  border: 1px solid var(--cs-line);
  border-radius: var(--cs-radius-lg);
  box-shadow: var(--cs-shadow-sm);
  padding: 40px;
  text-align: center;
}
.saved-icon {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--cs-green-100);
  border: 1.5px solid var(--cs-green-300);
  color: var(--cs-green-700);
  display: grid;
  place-items: center;
  margin: 0 auto 24px;
}
.saved-icon svg { width: 32px; height: 32px; }
.saved-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--cs-ink-900);
  margin-bottom: 8px;
}
.saved-sub {
  font-size: 14px;
  color: var(--cs-ink-200);
  margin-bottom: 28px;
}
.saved-id {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--cs-mist);
  border: 1px solid var(--cs-line);
  border-radius: var(--cs-radius-pill);
  padding: 8px 16px;
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--cs-ink-700);
  font-weight: 600;
}
.saved-id .copy-btn {
  background: none; border: none; padding: 0;
  color: var(--cs-ink-100); cursor: pointer; line-height: 0;
}
.saved-id .copy-btn:hover { color: var(--cs-green-700); }
.saved-id .copy-btn svg { width: 14px; height: 14px; }

.saved-details {
  text-align: left;
  background: var(--cs-paper);
  border: 1px solid var(--cs-line);
  border-radius: var(--cs-radius-md);
  padding: 18px 22px;
  margin: 28px auto 0;
  max-width: 480px;
}

.saved-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-top: 32px;
  flex-wrap: wrap;
}
  color: var(--cs-green-700);
  font-weight: 700;
  text-decoration: none;
  transition: color 120ms ease;
}
.signout-link:hover { color: var(--cs-green-900); }

/* ─────────────────────────────────────────────────────────────
   Persistent side menu (added for full-app integration)
   ───────────────────────────────────────────────────────────── */

.scr {
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: auto 1fr;
  height: 100vh;
  overflow: hidden;
}
.scr > .scr-app-bar { grid-column: 1 / -1; grid-row: 1; }
.scr > .scr-side {
  grid-column: 1; grid-row: 2;
  overflow: auto;
  background: var(--cs-white);
  border-right: 1px solid var(--cs-line);
  display: flex;
  flex-direction: column;
}
.scr > .scr-content {
  grid-column: 2; grid-row: 2;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.scr > .scr-content > .hstepper { flex-shrink: 0; }
.scr > .scr-content > .scr-main { flex: 1; overflow: auto; }

.side-section {
  padding: 18px 16px 6px;
}
.side-section + .side-section { padding-top: 14px; }
.side-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--cs-ink-100);
  margin-bottom: 8px;
  padding: 0 6px;
}

.side-nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.side-link {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 10px;
  border-radius: var(--cs-radius-sm);
  font-size: 13.5px;
  color: var(--cs-ink-400);
  font-weight: 500;
  text-decoration: none;
  transition: background 120ms ease, color 120ms ease;
  position: relative;
}
.side-link svg { width: 16px; height: 16px; flex-shrink: 0; }
.side-link:hover { background: var(--cs-mist); color: var(--cs-ink-900); }

.side-link.is-active {
  background: var(--cs-green-100);
  color: var(--cs-ink-900);
  font-weight: 700;
}
.side-link.is-active::before {
  content: "";
  position: absolute;
  left: -16px;
  top: 6px; bottom: 6px;
  width: 3px;
  background: var(--cs-green-700);
  border-radius: 0 2px 2px 0;
}
.side-link.is-active svg { color: var(--cs-green-700); }

.side-link.is-disabled {
  color: var(--cs-ink-100);
  cursor: not-allowed;
}
.side-link.is-disabled:hover { background: transparent; color: var(--cs-ink-100); }
.side-soon {
  margin-left: auto;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--cs-ink-100);
  background: var(--cs-mist);
  padding: 2px 6px;
  border-radius: 999px;
  text-transform: uppercase;
  border: 1px solid var(--cs-line);
}

.side-tenant {
  margin-top: auto;
  padding: 14px 16px;
  border-top: 1px solid var(--cs-line);
  font-size: 11.5px;
  color: var(--cs-ink-100);
}
.side-tenant .name {
  color: var(--cs-ink-700);
  font-weight: 700;
  font-size: 13px;
}
.side-tenant .role {
  font-size: 10.5px;

  letter-spacing: 0.1em;
  color: var(--cs-green-700);
  font-weight: 700;
  margin-top: 2px;
}

/* On narrow viewports, hide side menu — keep layout single-column */
@media (max-width: 880px) {
  .scr { grid-template-columns: 1fr; }
  .scr > .scr-side { display: none; }
  .scr > .scr-app-bar { grid-row: 1; }
  .scr > .scr-content { grid-column: 1; grid-row: 2; }

/* Search toolbar at top of the list page */

/* ─────────────────────────────────────────────────────────────
   Premium card visual — real bank-card design
   Used in  (card detail) + identical in  (result)
   ───────────────────────────────────────────────────────────── */

.card-visual {
  position: relative;
  border-radius: 14px;
  width: 100%;
  max-width: 380px;
  aspect-ratio: 1.586 / 1;
  padding: 22px 24px;
  color: #fff;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 18px 40px rgba(15, 30, 18, 0.22),
    0 6px 12px rgba(15, 30, 18, 0.14),
    inset 0 0 0 1px rgba(255, 255, 255, 0.08);
  /* Default: deep green with gold band — Verve Standard look */
  background:
    radial-gradient(circle at 82% 18%, rgba(212, 167, 72, 0.42), transparent 45%),
    radial-gradient(circle at 12% 88%, rgba(0, 0, 0, 0.32), transparent 50%),
    linear-gradient(135deg, #156A38 0%, #0F4F2E 55%, #093A22 100%);
  font-family: var(--font-display);
}

/* Variant: full gold premium (Verve Gold) */
.card-visual.gold {
  background:
    radial-gradient(circle at 78% 22%, rgba(255, 240, 200, 0.4), transparent 50%),
    radial-gradient(circle at 15% 85%, rgba(0, 0, 0, 0.3), transparent 50%),
    linear-gradient(135deg, #D9B361 0%, #A88227 50%, #6E5217 100%);
  color: #FBF6E8;
}

/* Variant: platinum / dark */
.card-visual.platinum {
  background:
    radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.12), transparent 50%),
    linear-gradient(135deg, #4A4A4A 0%, #1F1F1F 100%);
}

/* Variant: USD blue */
.card-visual.usd {
  background:
    radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.15), transparent 50%),
    linear-gradient(135deg, #2C6FB8 0%, #0E2E5C 100%);
}

/* Variant: physical (carbon-fibre subtle texture, base green) */
.card-visual.physical {
  background:
    repeating-linear-gradient(45deg, transparent 0 8px, rgba(255,255,255,0.025) 8px 16px),
    radial-gradient(circle at 78% 22%, rgba(212, 167, 72, 0.32), transparent 50%),
    linear-gradient(135deg, #156A38 0%, #0F4F2E 60%, #06301B 100%);
}

/* Status modifiers */
.card-visual.frozen     { filter: saturate(0.32) brightness(0.78); }
.card-visual.terminated { filter: grayscale(1) brightness(0.55); }

/* Diagonal shimmer overlay — gives the metallic shine */
.card-visual::before {
  content: "";
  position: absolute;
  inset: -2px;
  background: linear-gradient(115deg,
    transparent 38%,
    rgba(255, 255, 255, 0.18) 50%,
    rgba(255, 255, 255, 0.04) 56%,
    transparent 64%);
  pointer-events: none;
  z-index: 0;
}

/* Soft corner glow */
.card-visual::after {
  content: "";
  position: absolute;
  width: 220px; height: 220px;
  right: -60px; top: -60px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

  letter-spacing: 0.18em;

}

  font-size: 9.5px;
  font-weight: 700;

/* Chip + contactless row */
.cv-chip-row {
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  z-index: 1;
  margin: auto 0;
}
.cv-chip {
  width: 44px; height: 33px;
  border-radius: 6px;
  background:
    linear-gradient(140deg,
      #F5DA94 0%,
      #E9C36F 30%,
      #C09642 55%,
      #8B6924 100%);

    inset 0 0 0 1px rgba(255, 255, 255, 0.28),
    inset 0 -1px 0 rgba(0, 0, 0, 0.25),

.cv-chip::before {
  content: "";

  top: 7px; bottom: 7px;

      transparent 23%, transparent 49%,
      rgba(0,0,0,0.2) 49%, rgba(0,0,0,0.2) 50%,

      transparent 78%),
    linear-gradient(to bottom,
      transparent 0,    transparent 33%,
      rgba(0,0,0,0.2) 33%, rgba(0,0,0,0.2) 35%,
      transparent 35%, transparent 65%,
      rgba(0,0,0,0.2) 65%, rgba(0,0,0,0.2) 67%,

  border-radius: 2px;
}

.cv-contactless {

/* PAN */
.cv-pan {
  display: flex;
  gap: 14px;

}

/* Footer */

  display: flex;

}

  font-size: 8px;

}

  font-size: 12px;

/* Scheme mark (Verve) — two overlapping circles, red + green */
.cv-scheme {
  display: flex;

.cv-scheme-mark {
  position: relative;
  width: 36px;

}
.cv-scheme-mark::before,

  content: "";

  width: 18px; height: 18px;
  border-radius: 50%;
  top: 0;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.cv-scheme-mark::before { left: 0;  background: #C8242C; }
.cv-scheme-mark::after  { right: 0; background: #1B7A45; mix-blend-mode: normal; }
.cv-scheme-mark .blend {
  position: absolute;
  width: 6px; height: 18px;
  left: 15px; top: 0;
  background: #7A4F1F;
  mix-blend-mode: multiply;
}
.cv-scheme-name {
  font-family: var(--font-display);
  font-size: 10.5px;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;

// ───── Status override store (sessionStorage so freeze/unfreeze persist
// across pages until the tab is closed) ─────
const OVERRIDE_KEY = "kardit_card_overrides_v1";
function getOverrides() {
  try { return JSON.parse(sessionStorage.getItem(OVERRIDE_KEY) || "{}"); } catch { return {}; }
}
function setOverride(cardId, patch) {
  const all = getOverrides();
  all[cardId] = { ...(all[cardId] || {}), ...patch };
  sessionStorage.setItem(OVERRIDE_KEY, JSON.stringify(all));
}

// ───── Card lookup ─────
function findCard(cardId) {
  // First check the static seed pool
  for (const owner of CARD_OWNERS) {
    const c = owner.cards.find(c => c.id === cardId);
    if (c) {
      const ov = getOverrides()[cardId];
      return {
        ...c,
        status: ov?.status || c.status,
        lastChangedAt: ov?.changedAt || null,
        cmsRef: ov?.cmsRef || null,
        owner,
      };
    }
  }
  // Then check the just-minted-card pool (from  result)
  try {
    const iss = JSON.parse(sessionStorage.getItem("kardit_iss_state_v1") || "{}");
    if (iss.outcome && iss.outcome.cardId === cardId) {
      const ov = getOverrides()[cardId];
      return {
        id: iss.outcome.cardId,
        maskedPan: iss.outcome.maskedPan,
        expiry: `${iss.outcome.expiryMonth}/${iss.outcome.expiryYear}`,
        product: "Verve Prepaid Standard",
        bank: "Zenith Bank",
        bankCode: iss.bankId || "BNK-ZEN-002",
        type: iss.productType || "VIRTUAL",
        status: ov?.status || iss.outcome.status,
        createdAt: iss.outcome.createdAt,
        lastChangedAt: ov?.changedAt || null,
        cmsRef: ov?.cmsRef || null,
        owner: {
          ref: iss.customerId,
          fullName: iss.customer?.fullName || "Recently captured customer",
          phone: iss.customer?.phone || "",
        },
      };
    }
  } catch (e) {}
  return null;
}

// ───── Deterministic mock balance based on card id ─────
function mockBalance(cardId) {
  // Simple hash → pseudo-random
  let h = 0;
  for (let i = 0; i < cardId.length; i++) h = ((h << 5) - h + cardId.charCodeAt(i)) | 0;
  const seed = Math.abs(h);
  const ledger = 50000 + (seed % 450000);
  const reserved = (seed % 5000);
  return {
    ledgerBalance: ledger,
    availableBalance: ledger - reserved,
    currency: "NGN",
  };
}

// Mock recent transactions (placeholder for )
function mockTxns(cardId) {
  const seed = cardId.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const pool = [
    { type: "out", merchant: "Chowdeck", category: "Food delivery",  amount: -3500 },
    { type: "out", merchant: "Bolt",     category: "Transport",      amount: -2200 },
    { type: "in",  merchant: "Funding",  category: "Affiliate load", amount:  50000 },
    { type: "out", merchant: "Spar Lekki", category: "Groceries",    amount: -18450 },
    { type: "out", merchant: "Netflix",  category: "Subscription",   amount: -4500 },
  ];
  // Vary count per card based on seed
  const count = 3 + (seed % 3);
  return pool.slice(0, count);
}

function fmtAmount(amt, currency) {
  const sign = amt < 0 ? "-" : "";
  const sym = currency === "USD" ? "$" : "₦";
  return sign + sym + Math.abs(amt).toLocaleString("en-NG", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtMoneyPlain(amt, currency) {
  const sym = currency === "USD" ? "$" : "₦";
  return sym + amt.toLocaleString("en-NG", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleString("en-GB", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
}
function getParam(k) { return new URLSearchParams(window.location.search).get(k); }
function genCmsRef(prefix) {
  return prefix + "-" + String(8821000 + Math.floor(Math.random() * 9999)).padStart(7, "0");
}
function genReqId(prefix) {
  return prefix + "-" + String(20 + Math.floor(Math.random() * 999)).padStart(5, "0");
}
function genIdemKey(prefix) {
  return prefix + "-idem-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now().toString(36);
}

        <div class="confirm-card-info">
          <div class="confirm-card-pan">${card.maskedPan.replace(/\*/g, "•")}</div>
          <div class="confirm-card-meta">${card.product} · ${card.bank} · ${card.owner.fullName}</div>
        </div>
      </div>

      <div class="transition-arrow">
        <span class="transition-status frozen">FROZEN</span>
        <span class="arr"><i data-lucide="arrow-right"></i></span>
        <span class="transition-status active">ACTIVE</span>
      </div>

      <form id="unfreeze-form" autocomplete="off">
        <div class="field" style="margin-bottom:20px">
          <label for="reason" class="lbl" style="font-size:13px;font-weight:700;color:var(--cs-ink-700);margin-bottom:8px;display:block">
            Reason<span class="req">*</span>
          </label>
          <select id="reason" name="reason" required style="background:var(--cs-white);border:1px solid var(--cs-line-strong);border-radius:6px;padding:10px 13px;font-size:13.5px;width:100%">
            <option value="">Select a reason…</option>
            ${UNFREEZE_REASONS.map(r => `<option value="${r.value}">${r.label}</option>`).join("")}
          </select>
          <div class="help" style="font-size:11.5px;color:var(--cs-ink-100);margin-top:5px">Recorded in CardLifecycleEvent () and AuditLog.</div>
        </div>

        <div class="confirm-actions">
          <a href="index.html?cardId=${encodeURIComponent(card.id)}" class="btn btn-ghost"><i data-lucide="x"></i> Cancel</a>
          <button id="unfreeze-btn" type="submit" class="btn btn-primary"><i data-lucide="play"></i> Unfreeze card</button>
        </div>
      </form>

      <div class="idem-key-strip">
        <strong>Request</strong> ${genReqId("REQ-UNF")} · <strong>Idempotency</strong> ${genIdemKey("unf")}
      </div>
    </div>
  `;

  if (window.lucide) lucide.createIcons();

  document.getElementById("unfreeze-form").addEventListener("submit", e => {
    e.preventDefault();
    const reason = document.getElementById("reason").value;
    if (!reason) return;
    const btn = document.getElementById("unfreeze-btn");
    btn.disabled = true;
    btn.innerHTML = `<i data-lucide="loader-2" class="spin"></i> Calling CMS…`;
    if (window.lucide) lucide.createIcons();

    setTimeout(() => {
      const cmsRef = genCmsRef("CMS-SRV");
      const changedAt = new Date().toISOString();
      setOverride(card.id, { status: "ACTIVE", changedAt, cmsRef, reason });
      window.location.href = `index.html?cardId=${encodeURIComponent(card.id)}&just=unfroze`;
    }, 1100);
  });
}

</script>
  <script>initCardDetail();</script>
</body>
</html>
